<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIM-AI TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0a0a;
      --bg2:     #111111;
      --bg3:     #181818;
      --bg4:     #1f1f1f;
      --border:  #262626;
      --border2: #333333;
      --orange:  #FF6600;
      --orange2: #FF8C00;
      --green:   #00E676;
      --green2:  #00C853;
      --red:     #FF1744;
      --red2:    #FF5252;
      --amber:   #FFB300;
      --cyan:    #00E5FF;
      --purple:  #AA00FF;
      --teal:    #00BFA5;
      --blue:    #2979FF;
      --white:   #F0F0F0;
      --gray:    #888888;
      --dim:     #555555;
      --font:    'IBM Plex Mono', 'Courier New', 'Courier', monospace;
      --sidebar: 230px;
      --topbar:  44px;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── Top Bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar);
      background: var(--bg2);
      border-bottom: 1px solid var(--orange);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 14px;
      z-index: 100;
      user-select: none;
    }
    .tb-brand {
      color: var(--orange);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }
    .tb-brand span { color: var(--white); }
    .tb-divider { width: 1px; height: 22px; background: var(--border2); flex-shrink: 0; }
    .tb-live {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--green); font-weight: 600; letter-spacing: 0.1em;
    }
    .tb-live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .tb-stats {
      display: flex; gap: 10px; align-items: center;
      font-size: 11px; color: var(--gray); white-space: nowrap;
    }
    .tb-stats .major { color: var(--red); }
    .tb-stats .sig   { color: var(--orange); }
    .tb-clock {
      margin-left: auto;
      font-size: 12px; color: var(--gray);
      white-space: nowrap; letter-spacing: 0.05em;
    }
    .tb-date { color: var(--orange2); font-weight: 500; }
    #hamburger {
      display: none;
      background: none; border: none; cursor: pointer;
      color: var(--orange); font-size: 18px; padding: 4px;
      flex-shrink: 0;
    }

    /* ── Layout ── */
    #layout {
      display: flex;
      position: fixed;
      top: var(--topbar); left: 0; right: 0; bottom: 0;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.25s ease;
    }
    .sidebar-hdr {
      padding: 10px 12px 8px;
      font-size: 10px; font-weight: 700;
      color: var(--dim); letter-spacing: 0.15em;
      border-bottom: 1px solid var(--border);
    }
    #date-list { overflow-y: auto; flex: 1; padding: 6px 0; }
    .date-item {
      padding: 8px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .date-item:hover { background: var(--bg3); }
    .date-item.active {
      border-left-color: var(--orange);
      background: var(--bg3);
    }
    .date-item .di-date {
      font-size: 11px; font-weight: 600; color: var(--orange2); letter-spacing: 0.05em;
    }
    .date-item.active .di-date { color: var(--orange); }
    .date-item .di-headline {
      font-size: 10px; color: var(--gray);
      line-height: 1.4; margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .date-item .di-badges { display: flex; gap: 4px; margin-top: 5px; }
    .di-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 2px;
    }
    .di-badge.major { background: rgba(255,23,68,0.18); color: var(--red2); }
    .di-badge.sig   { background: rgba(255,102,0,0.18); color: var(--orange); }

    /* Category filter */
    .sidebar-filters { border-top: 1px solid var(--border); padding: 8px; }
    .filter-hdr {
      font-size: 10px; font-weight: 700; color: var(--dim);
      letter-spacing: 0.12em; margin-bottom: 6px;
    }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
      padding: 3px 7px; border-radius: 2px; cursor: pointer;
      border: 1px solid var(--border2); color: var(--gray);
      background: var(--bg3); transition: all 0.15s;
    }
    .chip:hover { border-color: var(--gray); color: var(--white); }
    .chip.active { color: var(--bg); }

    /* ── Main Content ── */
    #main {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 18px 20px 40px;
    }

    /* Brief Header */
    #brief-hdr {
      border-bottom: 1px solid var(--border2);
      padding-bottom: 12px; margin-bottom: 16px;
    }
    .bh-date {
      font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
      color: var(--orange); margin-bottom: 4px;
    }
    .bh-headline {
      font-size: 15px; font-weight: 600; color: var(--white); line-height: 1.4;
    }
    .bh-summary {
      font-size: 11px; color: var(--gray); margin-top: 6px; line-height: 1.6;
    }
    .bh-stats {
      display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap;
    }
    .bh-stat {
      font-size: 10px; display: flex; align-items: center; gap: 5px;
    }
    .bh-stat .num { font-weight: 700; font-size: 13px; }
    .bh-stat.total .num { color: var(--white); }
    .bh-stat.major .num { color: var(--red); }
    .bh-stat.sig .num   { color: var(--orange); }

    /* Signal Box */
    #signal-box {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--orange);
      border-radius: 2px;
      padding: 12px 14px;
      margin-bottom: 20px;
    }
    .signal-hdr {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      color: var(--orange); margin-bottom: 10px;
    }
    .signal-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 6px 0; border-bottom: 1px solid var(--border);
    }
    .signal-item:last-child { border-bottom: none; padding-bottom: 0; }
    .signal-bullet {
      font-size: 14px; color: var(--orange); flex-shrink: 0; line-height: 1.2;
    }
    .signal-content {}
    .signal-headline {
      font-size: 12px; font-weight: 600; color: var(--white); line-height: 1.3;
    }
    .signal-detail {
      font-size: 11px; color: var(--gray); margin-top: 2px; line-height: 1.5;
    }

    /* Story Cards */
    .stories-hdr {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      color: var(--dim); margin-bottom: 12px;
    }
    .story-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .story-card:hover { border-color: var(--border2); }
    .story-card.filtered-out { display: none; }

    .story-head {
      padding: 12px 14px;
      cursor: pointer;
      display: flex; flex-direction: column; gap: 7px;
    }
    .story-meta {
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .cat-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      padding: 2px 7px; border-radius: 2px;
    }
    .cat-POLICY   { background: rgba(170,0,255,0.15); color: #CC44FF; border: 1px solid rgba(170,0,255,0.3); }
    .cat-PEOPLE   { background: rgba(0,229,255,0.12); color: var(--cyan); border: 1px solid rgba(0,229,255,0.25); }
    .cat-SAFETY   { background: rgba(255,23,68,0.15); color: var(--red2); border: 1px solid rgba(255,23,68,0.3); }
    .cat-BUSINESS { background: rgba(0,230,118,0.12); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
    .cat-PRODUCT  { background: rgba(41,121,255,0.15); color: #6699FF; border: 1px solid rgba(41,121,255,0.3); }
    .cat-MODEL    { background: rgba(255,102,0,0.15); color: var(--orange); border: 1px solid rgba(255,102,0,0.3); }
    .cat-TOOL     { background: rgba(0,191,165,0.12); color: var(--teal); border: 1px solid rgba(0,191,165,0.25); }
    .cat-RESEARCH { background: rgba(186,104,200,0.15); color: #CE93D8; border: 1px solid rgba(186,104,200,0.3); }

    .priority-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .p1 { background: var(--red); box-shadow: 0 0 6px rgba(255,23,68,0.5); }
    .p2 { background: var(--orange); box-shadow: 0 0 6px rgba(255,102,0,0.4); }
    .p3 { background: var(--amber); }
    .p4 { background: var(--dim); }

    .priority-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    }
    .p1-txt { color: var(--red2); }
    .p2-txt { color: var(--orange); }
    .p3-txt { color: var(--amber); }

    .tag-pill {
      font-size: 9px; color: var(--dim); letter-spacing: 0.05em;
      border: 1px solid var(--border); padding: 1px 5px; border-radius: 2px;
    }

    .story-title {
      font-size: 13px; font-weight: 600; color: var(--white); line-height: 1.4;
    }
    .story-subtitle {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .story-event-date { font-size: 10px; color: var(--dim); }
    .story-sources { display: flex; gap: 6px; flex-wrap: wrap; }
    .story-src-link {
      font-size: 10px; color: var(--blue); text-decoration: none; transition: color 0.15s;
    }
    .story-src-link:hover { color: var(--cyan); text-decoration: underline; }
    .expand-arrow {
      font-size: 10px; color: var(--dim); margin-left: auto; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .story-card.open .expand-arrow { transform: rotate(180deg); }

    /* Story Body */
    .story-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    .story-card.open .story-body { display: block; }
    .story-section { padding: 11px 14px; border-bottom: 1px solid var(--border); }
    .story-section:last-child { border-bottom: none; }
    .ss-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.15em;
      color: var(--dim); margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
    }
    .ss-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .ss-text {
      font-size: 11px; color: var(--gray); line-height: 1.7;
    }
    .ss-list { list-style: none; padding: 0; }
    .ss-list li {
      font-size: 11px; color: var(--gray); line-height: 1.6;
      padding-left: 14px; position: relative; margin-bottom: 3px;
    }
    .ss-list li::before {
      content: '▸'; position: absolute; left: 0; color: var(--dim); font-size: 9px; top: 3px;
    }
    .ss-catch li::before { color: var(--red2); content: '✗'; }
    .ss-cando li::before { color: var(--green2); content: '✓'; }
    .takeaway-box {
      background: var(--bg3); border-left: 3px solid var(--orange);
      padding: 9px 12px; border-radius: 0 2px 2px 0; margin-top: 4px;
    }
    .takeaway-box .ss-text { color: var(--white); font-style: italic; font-size: 12px; }
    .vs-box {
      font-size: 11px; color: var(--dim); background: var(--bg3);
      padding: 6px 10px; border-radius: 2px; border: 1px solid var(--border); font-style: italic;
    }

    /* Quick Hits */
    #quick-hits { margin-top: 24px; }
    .qh-hdr {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      color: var(--dim); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .qh-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .qh-list { display: flex; flex-direction: column; gap: 6px; }
    .qh-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 2px; padding: 9px 12px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .qh-bullet { color: var(--orange); flex-shrink: 0; font-size: 10px; margin-top: 2px; }
    .qh-content {}
    .qh-title { font-size: 11px; font-weight: 700; color: var(--white); }
    .qh-text  { font-size: 11px; color: var(--gray); margin-top: 1px; line-height: 1.5; }
    .qh-link  { font-size: 10px; color: var(--blue); text-decoration: none; margin-top: 2px; display: inline-block; }
    .qh-link:hover { color: var(--cyan); text-decoration: underline; }

    /* Empty state */
    #empty-state {
      display: none; padding: 40px 20px; text-align: center; color: var(--dim);
      font-size: 12px; line-height: 2;
    }

    /* Mobile date bar */
    #mobile-datebar {
      display: none;
      overflow-x: auto; padding: 8px 12px; gap: 6px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #mobile-datebar::-webkit-scrollbar { display: none; }
    .mob-date-chip {
      flex-shrink: 0; padding: 5px 10px; border-radius: 2px; cursor: pointer;
      font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
      border: 1px solid var(--border2); color: var(--gray); background: var(--bg3);
      white-space: nowrap; transition: all 0.15s;
    }
    .mob-date-chip.active {
      background: var(--orange); color: var(--bg); border-color: var(--orange);
    }

    /* Sidebar overlay on mobile */
    #sidebar-overlay {
      display: none;
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 90;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      html, body { font-size: 12px; overflow: auto; }
      #layout { position: static; flex-direction: column; height: auto; overflow: visible; }
      #main { overflow: visible; padding: 12px 12px 40px; }
      #sidebar {
        position: fixed;
        top: var(--topbar); left: 0; bottom: 0;
        z-index: 95;
        transform: translateX(-100%);
        width: 260px;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; }
      #mobile-datebar { display: flex; }
      #hamburger { display: block; }
      .tb-stats { display: none; }
      .bh-headline { font-size: 13px; }
      .story-title { font-size: 12px; }
      .takeaway-box .ss-text { font-size: 11px; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<header id="topbar">
  <button id="hamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
  <div class="tb-brand">LIM<span>-</span>AI <span style="color:var(--dim)">TERMINAL</span></div>
  <div class="tb-divider"></div>
  <div class="tb-live"><div class="tb-live-dot"></div>LIVE</div>
  <div class="tb-stats" id="tb-stats"></div>
  <div class="tb-clock" id="tb-clock"></div>
</header>

<!-- Sidebar overlay (mobile) -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Layout -->
<div id="layout">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-hdr">ARCHIVE</div>
    <div id="date-list"></div>
    <div class="sidebar-filters">
      <div class="filter-hdr">FILTER BY CATEGORY</div>
      <div class="filter-chips" id="filter-chips"></div>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <!-- Mobile date bar -->
    <div id="mobile-datebar"></div>

    <!-- Brief content injected here -->
    <div id="brief-hdr"></div>
    <div id="signal-box"></div>
    <div id="stories-wrap"></div>
    <div id="quick-hits"></div>
    <div id="empty-state">NO STORIES MATCH THE ACTIVE FILTER.<br>CLICK A CATEGORY TO CLEAR.</div>
  </main>
</div>

<script src="data.js"></script>
<script>
// ── State ──
let currentDate = null;
let activeFilter = null;

// ── Category config ──
const CAT_CONFIG = {
  POLICY:   { color: '#CC44FF', bg: 'rgba(170,0,255,0.15)' },
  PEOPLE:   { color: '#00E5FF', bg: 'rgba(0,229,255,0.12)' },
  SAFETY:   { color: '#FF5252', bg: 'rgba(255,23,68,0.15)' },
  BUSINESS: { color: '#00E676', bg: 'rgba(0,230,118,0.12)' },
  PRODUCT:  { color: '#6699FF', bg: 'rgba(41,121,255,0.15)' },
  MODEL:    { color: '#FF6600', bg: 'rgba(255,102,0,0.15)' },
  TOOL:     { color: '#00BFA5', bg: 'rgba(0,191,165,0.12)' },
  RESEARCH: { color: '#CE93D8', bg: 'rgba(186,104,200,0.15)' },
};

const PRIORITY_LABEL = { 1: 'MAJOR', 2: 'SIGNIFICANT', 3: 'NOTABLE', 4: 'FYI' };

// ── Clock ──
function updateClock() {
  const now = new Date();
  const d = now.toISOString().slice(0, 10);
  const t = now.toTimeString().slice(0, 8);
  document.getElementById('tb-clock').innerHTML =
    `<span class="tb-date">${d}</span> &nbsp;${t}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── Sidebar toggle (mobile) ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── Init ──
function init() {
  const briefs = AI_NEWS_DATA.briefs.slice().reverse(); // newest first
  renderSidebar(briefs);
  renderMobileDateBar(briefs);
  renderFilterChips();
  loadBrief(AI_NEWS_DATA.briefs[AI_NEWS_DATA.briefs.length - 1].date);
}

// ── Sidebar ──
function renderSidebar(briefs) {
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  briefs.forEach(b => {
    const el = document.createElement('div');
    el.className = 'date-item';
    el.dataset.date = b.date;
    el.innerHTML = `
      <div class="di-date">${b.date}</div>
      <div class="di-headline">${b.indexHeadline}</div>
      <div class="di-badges">
        ${b.stats.major > 0 ? `<span class="di-badge major">🔴 ${b.stats.major} MAJOR</span>` : ''}
        ${b.stats.significant > 0 ? `<span class="di-badge sig">🟠 ${b.stats.significant} SIG</span>` : ''}
      </div>`;
    el.onclick = () => { loadBrief(b.date); closeSidebar(); };
    list.appendChild(el);
  });
}

// ── Mobile date bar ──
function renderMobileDateBar(briefs) {
  const bar = document.getElementById('mobile-datebar');
  bar.innerHTML = '';
  briefs.forEach(b => {
    const chip = document.createElement('div');
    chip.className = 'mob-date-chip';
    chip.dataset.date = b.date;
    chip.textContent = b.date;
    chip.onclick = () => loadBrief(b.date);
    bar.appendChild(chip);
  });
}

// ── Filter chips ──
function renderFilterChips() {
  const container = document.getElementById('filter-chips');
  container.innerHTML = '';
  Object.entries(CAT_CONFIG).forEach(([cat, cfg]) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.cat = cat;
    chip.textContent = cat;
    chip.style.setProperty('--chip-color', cfg.color);
    chip.onclick = () => toggleFilter(cat);
    container.appendChild(chip);
  });
}

function toggleFilter(cat) {
  activeFilter = activeFilter === cat ? null : cat;
  document.querySelectorAll('.chip').forEach(c => {
    const active = c.dataset.cat === activeFilter;
    c.classList.toggle('active', active);
    if (active) {
      const cfg = CAT_CONFIG[cat] || {};
      c.style.background = cfg.bg || '';
      c.style.color = cfg.color || '';
      c.style.borderColor = cfg.color || '';
    } else {
      c.style.background = '';
      c.style.color = '';
      c.style.borderColor = '';
    }
  });
  applyFilter();
}

function applyFilter() {
  const cards = document.querySelectorAll('.story-card');
  let visible = 0;
  cards.forEach(card => {
    const match = !activeFilter || card.dataset.cat === activeFilter;
    card.classList.toggle('filtered-out', !match);
    if (match) visible++;
  });
  document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
}

// ── Load brief ──
function loadBrief(date) {
  currentDate = date;
  const brief = AI_NEWS_DATA.briefs.find(b => b.date === date);
  if (!brief) return;

  // Update sidebar selection
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', el.dataset.date === date);
  });
  document.querySelectorAll('.mob-date-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.date === date);
  });

  // Update topbar stats
  document.getElementById('tb-stats').innerHTML = `
    <span class="total">${brief.stats.total} STORIES</span>
    <span>·</span>
    <span class="major">🔴 ${brief.stats.major} MAJOR</span>
    <span>·</span>
    <span class="sig">🟠 ${brief.stats.significant} SIG</span>`;

  // Render brief header
  document.getElementById('brief-hdr').innerHTML = `
    <div class="bh-date">AI NEWS BRIEF — ${date}</div>
    <div class="bh-headline">${brief.indexHeadline}</div>
    <div class="bh-summary">${brief.indexSummary}</div>
    <div class="bh-stats">
      <div class="bh-stat total"><span class="num">${brief.stats.total}</span> STORIES TODAY</div>
      <div class="bh-stat major"><span class="num">${brief.stats.major}</span> MAJOR</div>
      <div class="bh-stat sig"><span class="num">${brief.stats.significant}</span> SIGNIFICANT</div>
    </div>`;

  // Render signal box
  document.getElementById('signal-box').innerHTML = `
    <div class="signal-hdr">▶ TODAY'S SIGNAL</div>
    ${brief.topSignal.map((s, i) => `
      <div class="signal-item">
        <div class="signal-bullet">0${i+1}</div>
        <div class="signal-content">
          <div class="signal-headline">${s.headline}</div>
          <div class="signal-detail">${s.detail}</div>
        </div>
      </div>`).join('')}`;

  // Render stories
  const wrap = document.getElementById('stories-wrap');
  wrap.innerHTML = `<div class="stories-hdr">TOP STORIES</div>`;
  brief.stories.forEach((s, idx) => {
    const card = document.createElement('div');
    card.className = 'story-card' + (idx === 0 ? ' open' : '');
    card.dataset.cat = s.category;
    card.innerHTML = `
      <div class="story-head" onclick="toggleStory(this.parentElement)">
        <div class="story-meta">
          <span class="cat-badge cat-${s.category}">${s.category}</span>
          <span class="priority-dot p${s.priorityLevel}"></span>
          <span class="priority-label p${s.priorityLevel}-txt">${PRIORITY_LABEL[s.priorityLevel]}</span>
          ${s.tags.map(t => `<span class="tag-pill">#${t}</span>`).join('')}
          <span class="expand-arrow">▼</span>
        </div>
        <div class="story-title">${s.id}. ${s.title}</div>
        <div class="story-subtitle">
          <span class="story-event-date">EVENT: ${s.eventDate}</span>
          <span class="story-sources">${s.sources.map(src =>
            `<a class="story-src-link" href="${src.url}" target="_blank" rel="noopener">[${src.name}]</a>`
          ).join('')}</span>
        </div>
      </div>
      <div class="story-body">
        <div class="story-section">
          <div class="ss-label">WHAT HAPPENED</div>
          <div class="ss-text">${s.whatHappened}</div>
        </div>
        <div class="story-section">
          <div class="ss-label">WHAT IT CAN DO</div>
          <ul class="ss-list ss-cando">${s.whatItCanDo.map(x => `<li>${x}</li>`).join('')}</ul>
        </div>
        <div class="story-section">
          <div class="ss-label">WHAT'S THE CATCH</div>
          <ul class="ss-list ss-catch">${s.whatsCatch.map(x => `<li>${x}</li>`).join('')}</ul>
        </div>
        <div class="story-section">
          <div class="ss-label">KEY TAKEAWAY</div>
          <div class="takeaway-box"><div class="ss-text">${s.keyTakeaway}</div></div>
        </div>
        <div class="story-section">
          <div class="ss-label">HOW IT CAN IMPROVE</div>
          <div class="ss-text">${s.howToImprove}</div>
        </div>
        <div class="story-section">
          <div class="ss-label">VS. PREVIOUS COVERAGE</div>
          <div class="vs-box">${s.vsPrevious}</div>
        </div>
      </div>`;
    wrap.appendChild(card);
  });

  // Render quick hits
  document.getElementById('quick-hits').innerHTML = `
    <div class="qh-hdr">QUICK HITS</div>
    <div class="qh-list">
      ${brief.quickHits.map(q => `
        <div class="qh-item">
          <div class="qh-bullet">◆</div>
          <div class="qh-content">
            <div class="qh-title">${q.title}</div>
            <div class="qh-text">${q.text}</div>
            <a class="qh-link" href="${q.url}" target="_blank" rel="noopener">→ SOURCE</a>
          </div>
        </div>`).join('')}
    </div>`;

  // Scroll to top
  document.getElementById('main').scrollTo(0, 0);
  window.scrollTo(0, 0);

  // Re-apply any active filter
  applyFilter();
}

// ── Toggle story open/close ──
function toggleStory(card) {
  card.classList.toggle('open');
}

// ── Run ──
init();
</script>
</body>
</html>
