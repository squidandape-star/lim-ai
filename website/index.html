<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIM-AI TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('lim-ai-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════════════
       DARK MODE
    ══════════════════════════════════════ */
    :root, [data-theme="dark"] {
      --bg:        #000000;
      --bg2:       #0d0d0d;
      --bg3:       #141414;
      --bg4:       #1a1a1a;
      --border:    #222222;
      --border2:   #2e2e2e;

      --orange:    #FF6600;
      --orange2:   #FF8800;
      --green:     #00FF88;
      --green2:    #00CC66;
      --red:       #FF1744;
      --red2:      #FF5252;
      --amber:     #FFB300;
      --cyan:      #00E5FF;
      --purple:    #CC44FF;
      --teal:      #00FFCC;
      --blue:      #4488FF;

      --text:      #F0F0F0;
      --text2:     #AAAAAA;
      --dim:       #555555;

      --topbar-bg:  #0d0d0d;
      --sidebar-bg: #0d0d0d;
      --card-bg:    #0d0d0d;
      --card-hover: #141414;

      /* accent — overridden per-category */
      --accent:    #FF6600;
      --accent2:   #FF8800;
    }

    /* ══════════════════════════════════════
       LIGHT MODE
    ══════════════════════════════════════ */
    [data-theme="light"] {
      --bg:        #FFFFFF;
      --bg2:       #F5F5F5;
      --bg3:       #EBEBEB;
      --bg4:       #E0E0E0;
      --border:    #D0D0D0;
      --border2:   #BBBBBB;

      --orange:    #CC4400;
      --orange2:   #AA3300;
      --green:     #006633;
      --green2:    #004D26;
      --red:       #CC0022;
      --red2:      #AA0011;
      --amber:     #886600;
      --cyan:      #0066AA;
      --purple:    #6600AA;
      --teal:      #006655;
      --blue:      #0044CC;

      --text:      #0D0D0D;
      --text2:     #444444;
      --dim:       #888888;

      --topbar-bg:  #F5F5F5;
      --sidebar-bg: #F5F5F5;
      --card-bg:    #FFFFFF;
      --card-hover: #F5F5F5;

      --accent:    #CC4400;
      --accent2:   #AA3300;
    }

    :root {
      --font:     'IBM Plex Mono', 'Courier New', monospace;
      --sidebar:  230px;
      --topbar:   44px;
      --catbar:   36px;
      --topoffset: 80px; /* topbar + catbar */
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ══════════════════════════════════════
       ALOHA SPLASH
    ══════════════════════════════════════ */
    #aloha {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 500;
      transition: opacity 0.6s ease;
    }
    #aloha.fade-out { opacity: 0; pointer-events: none; }
    .aloha-text {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--accent);
      animation: pulse-in 0.5s ease;
    }
    .aloha-sub {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--dim);
      margin-top: 12px;
      font-weight: 600;
    }
    @keyframes pulse-in {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ══════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════ */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar);
      background: var(--topbar-bg);
      border-bottom: 2px solid var(--accent);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
      z-index: 100;
      user-select: none;
      transition: border-color 0.3s;
    }
    .tb-brand {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.12em;
      white-space: nowrap;
      transition: color 0.3s;
    }
    .tb-brand span { color: var(--text); }
    .tb-divider { width: 1px; height: 22px; background: var(--border2); flex-shrink: 0; }
    .tb-live {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--green); font-weight: 600; letter-spacing: 0.1em;
    }
    .tb-live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .tb-stats {
      display: flex; gap: 10px; align-items: center;
      font-size: 11px; color: var(--text2); white-space: nowrap;
    }
    .tb-stats .s-major { color: var(--red); font-weight: 600; }
    .tb-stats .s-sig   { color: var(--accent); font-weight: 600; }
    .tb-clock { font-size: 12px; color: var(--text2); white-space: nowrap; }
    .tb-date  { color: var(--accent2); font-weight: 600; transition: color 0.3s; }
    .tb-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    #theme-toggle {
      background: none; border: 1px solid var(--border2);
      border-radius: 3px; cursor: pointer; padding: 4px 8px;
      font-family: var(--font); font-size: 11px; font-weight: 600;
      color: var(--text2); letter-spacing: 0.05em; transition: all 0.15s; flex-shrink: 0;
    }
    #theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    #hamburger {
      display: none; background: none; border: none; cursor: pointer;
      color: var(--accent); font-size: 18px; padding: 4px; flex-shrink: 0;
    }

    /* ══════════════════════════════════════
       CATEGORY BAR
    ══════════════════════════════════════ */
    #catbar {
      position: fixed;
      top: var(--topbar); left: 0; right: 0;
      height: var(--catbar);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 99;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #catbar::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0;
      padding: 0 14px;
      display: flex; align-items: center;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      color: var(--dim); cursor: pointer;
      border-bottom: 2px solid transparent;
      border-right: 1px solid var(--border);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .cat-tab:hover { color: var(--text2); background: var(--bg3); }
    .cat-tab.active {
      color: var(--bg) !important;
      border-bottom-color: transparent !important;
    }

    /* ══════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════ */
    #layout {
      display: flex;
      position: fixed;
      top: var(--topoffset); left: 0; right: 0; bottom: 0;
    }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    #sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform 0.25s ease, background 0.2s;
    }
    .sidebar-hdr {
      padding: 10px 12px 8px;
      font-size: 10px; font-weight: 700;
      color: var(--dim); letter-spacing: 0.15em;
      border-bottom: 1px solid var(--border);
    }
    #date-list { overflow-y: auto; flex: 1; padding: 6px 0; }
    .date-item {
      padding: 8px 12px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .date-item:hover { background: var(--bg3); }
    .date-item.active { border-left-color: var(--accent); background: var(--bg3); }
    .di-date {
      font-size: 11px; font-weight: 600; color: var(--accent2); letter-spacing: 0.05em;
      transition: color 0.3s;
    }
    .date-item.active .di-date { color: var(--accent); }
    .di-headline {
      font-size: 10px; color: var(--text2); line-height: 1.4; margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .di-badges { display: flex; gap: 4px; margin-top: 5px; }
    .di-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 2px; }
    [data-theme="dark"] .di-badge.major { background: rgba(255,23,68,0.18); color: var(--red2); }
    [data-theme="dark"] .di-badge.sig   { background: rgba(255,102,0,0.18); color: var(--accent); }
    [data-theme="light"] .di-badge.major { background: rgba(204,0,34,0.1); color: var(--red2); border: 1px solid rgba(204,0,34,0.2); }
    [data-theme="light"] .di-badge.sig   { background: rgba(204,68,0,0.1); color: var(--accent); border: 1px solid rgba(204,68,0,0.2); }

    .sidebar-filters { border-top: 1px solid var(--border); padding: 8px; }
    .filter-hdr { font-size: 10px; font-weight: 700; color: var(--dim); letter-spacing: 0.12em; margin-bottom: 6px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
      padding: 3px 7px; border-radius: 2px; cursor: pointer;
      border: 1px solid var(--border2); color: var(--text2);
      background: var(--bg3); transition: all 0.15s;
    }
    .chip:hover { border-color: var(--text2); color: var(--text); }
    .chip.active { color: var(--bg) !important; }

    /* ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════ */
    #main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 18px 20px 40px; }

    #brief-hdr { border-bottom: 1px solid var(--border2); padding-bottom: 12px; margin-bottom: 16px; }
    .bh-date { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 4px; transition: color 0.3s; }
    .bh-headline { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .bh-summary { font-size: 11px; color: var(--text2); margin-top: 6px; line-height: 1.6; }
    .bh-stats { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
    .bh-stat { font-size: 10px; display: flex; align-items: center; gap: 5px; }
    .bh-stat .num { font-weight: 700; font-size: 13px; }
    .bh-stat.total .num { color: var(--text); }
    .bh-stat.major .num { color: var(--red); }
    .bh-stat.sig   .num { color: var(--accent); }

    #signal-box {
      background: var(--bg2); border: 1px solid var(--border2);
      border-left: 3px solid var(--accent);
      border-radius: 2px; padding: 12px 14px; margin-bottom: 20px;
      transition: border-left-color 0.3s;
    }
    .signal-hdr { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 10px; transition: color 0.3s; }
    .signal-item { display: flex; gap: 10px; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .signal-item:last-child { border-bottom: none; padding-bottom: 0; }
    .signal-bullet { font-size: 14px; color: var(--accent); flex-shrink: 0; line-height: 1.2; transition: color 0.3s; }
    .signal-headline { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .signal-detail { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.5; }

    /* Empty / no-data state */
    #no-data {
      display: none; padding: 60px 20px; text-align: center;
      color: var(--dim); font-size: 12px; line-height: 2.2;
    }
    .no-data-label { font-size: 32px; color: var(--accent); font-weight: 700; margin-bottom: 14px; transition: color 0.3s; }

    /* Story Cards */
    .stories-hdr { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--dim); margin-bottom: 12px; }
    .story-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 2px; margin-bottom: 10px; overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
    }
    .story-card:hover { background: var(--card-hover); }
    .story-card.filtered-out { display: none; }
    .story-head { padding: 12px 14px; cursor: pointer; display: flex; flex-direction: column; gap: 7px; }
    .story-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .cat-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 2px; }

    /* Badge colours (dark) */
    [data-theme="dark"] .cat-badge { background: rgba(255,255,255,0.07); color: var(--text2); border: 1px solid var(--border2); }
    /* Badge colours (light) */
    [data-theme="light"] .cat-badge { background: rgba(0,0,0,0.05); color: var(--text2); border: 1px solid var(--border2); }

    /* Per-category badge accent (applied via JS inline style on badge) */

    .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .p1 { background: var(--red);   box-shadow: 0 0 6px color-mix(in srgb, var(--red) 50%, transparent); }
    .p2 { background: var(--accent); box-shadow: 0 0 6px color-mix(in srgb, var(--accent) 40%, transparent); transition: background 0.3s; }
    .p3 { background: var(--amber); }
    .p4 { background: var(--dim); }
    .priority-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; }
    .p1-txt { color: var(--red); }
    .p2-txt { color: var(--accent); transition: color 0.3s; }
    .p3-txt { color: var(--amber); }
    .tag-pill { font-size: 9px; color: var(--dim); letter-spacing: 0.05em; border: 1px solid var(--border); padding: 1px 5px; border-radius: 2px; }
    .story-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .story-subtitle { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .story-event-date { font-size: 10px; color: var(--dim); }
    .story-sources { display: flex; gap: 6px; flex-wrap: wrap; }
    .story-src-link { font-size: 10px; color: var(--blue); text-decoration: none; transition: color 0.15s; }
    .story-src-link:hover { color: var(--cyan); text-decoration: underline; }
    .expand-arrow { font-size: 10px; color: var(--dim); margin-left: auto; flex-shrink: 0; transition: transform 0.2s; }
    .story-card.open .expand-arrow { transform: rotate(180deg); }

    .story-body { display: none; border-top: 1px solid var(--border); }
    .story-card.open .story-body { display: block; }
    .story-section { padding: 11px 14px; border-bottom: 1px solid var(--border); }
    .story-section:last-child { border-bottom: none; }
    .ss-label { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; color: var(--dim); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .ss-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .ss-text { font-size: 11px; color: var(--text2); line-height: 1.7; }
    .ss-list { list-style: none; padding: 0; }
    .ss-list li { font-size: 11px; color: var(--text2); line-height: 1.6; padding-left: 14px; position: relative; margin-bottom: 3px; }
    .ss-list li::before { position: absolute; left: 0; font-size: 9px; top: 3px; }
    .ss-catch li::before { content: '✗'; color: var(--red); }
    .ss-cando li::before { content: '✓'; color: var(--green); }
    .takeaway-box { background: var(--bg3); border-left: 3px solid var(--accent); padding: 9px 12px; border-radius: 0 2px 2px 0; margin-top: 4px; transition: border-left-color 0.3s; }
    .takeaway-box .ss-text { color: var(--text); font-style: italic; font-size: 12px; }
    .vs-box { font-size: 11px; color: var(--dim); background: var(--bg3); padding: 6px 10px; border-radius: 2px; border: 1px solid var(--border); font-style: italic; }

    #quick-hits { margin-top: 24px; }
    .qh-hdr { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--dim); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .qh-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .qh-list { display: flex; flex-direction: column; gap: 6px; }
    .qh-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 2px; padding: 9px 12px; display: flex; align-items: flex-start; gap: 10px; }
    .qh-bullet { color: var(--accent); flex-shrink: 0; font-size: 10px; margin-top: 2px; transition: color 0.3s; }
    .qh-title { font-size: 11px; font-weight: 700; color: var(--text); }
    .qh-text  { font-size: 11px; color: var(--text2); margin-top: 1px; line-height: 1.5; }
    .qh-link  { font-size: 10px; color: var(--blue); text-decoration: none; margin-top: 2px; display: inline-block; }
    .qh-link:hover { color: var(--cyan); text-decoration: underline; }

    #empty-state { display: none; padding: 40px 20px; text-align: center; color: var(--dim); font-size: 12px; line-height: 2; }

    /* Mobile date bar */
    #mobile-datebar { display: none; overflow-x: auto; padding: 8px 12px; gap: 6px; border-bottom: 1px solid var(--border); background: var(--bg2); -webkit-overflow-scrolling: touch; scrollbar-width: none; margin: -18px -12px 14px; }
    #mobile-datebar::-webkit-scrollbar { display: none; }
    .mob-date-chip { flex-shrink: 0; padding: 5px 10px; border-radius: 2px; cursor: pointer; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; border: 1px solid var(--border2); color: var(--text2); background: var(--bg3); white-space: nowrap; transition: all 0.15s; }
    .mob-date-chip.active { color: var(--bg); border-color: var(--accent); }

    /* Sidebar overlay */
    #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 700px) {
      :root { --topoffset: 80px; }
      html, body { font-size: 12px; overflow: auto; }
      #layout { position: static; flex-direction: column; height: auto; overflow: visible; }
      #main { overflow: visible; padding: 12px 12px 40px; }
      #sidebar { position: fixed; top: var(--topoffset); left: 0; bottom: 0; z-index: 95; width: 260px; transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; }
      #mobile-datebar { display: flex; }
      #hamburger { display: block; }
      .tb-stats { display: none; }
      .bh-headline { font-size: 13px; }
      .story-title { font-size: 12px; }
      .cat-tab { padding: 0 10px; font-size: 9px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     ALOHA SPLASH
══════════════════════════════════════ -->
<div id="aloha">
  <div class="aloha-text">ALOHA!</div>
  <div class="aloha-sub">LIM-AI TERMINAL</div>
</div>

<!-- ══════════════════════════════════════
     TOP BAR
══════════════════════════════════════ -->
<header id="topbar">
  <button id="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="tb-brand">LIM<span>-</span>AI <span style="opacity:0.4">TERMINAL</span></div>
  <div class="tb-divider"></div>
  <div class="tb-live"><div class="tb-live-dot"></div>LIVE</div>
  <div class="tb-stats" id="tb-stats"></div>
  <div class="tb-right">
    <div class="tb-clock" id="tb-clock"></div>
    <button id="theme-toggle" onclick="toggleTheme()">☀ LIGHT</button>
  </div>
</header>

<!-- ══════════════════════════════════════
     CATEGORY BAR
══════════════════════════════════════ -->
<div id="catbar"></div>

<!-- ══════════════════════════════════════
     TERMINAL LAYOUT
══════════════════════════════════════ -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="layout">
  <aside id="sidebar">
    <div class="sidebar-hdr">ARCHIVE</div>
    <div id="date-list"></div>
    <div class="sidebar-filters">
      <div class="filter-hdr">FILTER BY CATEGORY</div>
      <div class="filter-chips" id="filter-chips"></div>
    </div>
  </aside>

  <main id="main">
    <div id="mobile-datebar"></div>
    <div id="no-data">
      <div class="no-data-label">COMING SOON</div>
      First brief generates at 9:00 AM UTC+7.<br>
      Check back tomorrow.
    </div>
    <div id="brief-hdr"></div>
    <div id="signal-box"></div>
    <div id="stories-wrap"></div>
    <div id="quick-hits"></div>
    <div id="empty-state">NO STORIES MATCH THE ACTIVE FILTER.<br>CLICK A CATEGORY TO CLEAR.</div>
  </main>
</div>

<!-- Data files — one per category -->
<script src="data-ai-news.js"></script>
<script src="data-global-fin-news.js"></script>
<script src="data-global-news.js"></script>
<script src="data-indo-fin-news.js"></script>
<script src="data-indo-news.js"></script>
<script src="data-crypto-news.js"></script>
<script src="data-blockchain-news.js"></script>

<script>
// ══════════════════════════════════════════════════════════════
//  CATEGORY CONFIG
// ══════════════════════════════════════════════════════════════
const CATEGORIES = [
  { id: 'ai-news',          label: 'AI NEWS',       accentD: '#FF6600', accentL: '#CC4400' },
  { id: 'global-fin-news',  label: 'GLOBAL FIN',    accentD: '#00FF88', accentL: '#006633' },
  { id: 'global-news',      label: 'GLOBAL NEWS',   accentD: '#00E5FF', accentL: '#0066AA' },
  { id: 'indo-fin-news',    label: 'INDO FIN',      accentD: '#FF1744', accentL: '#CC0022' },
  { id: 'indo-news',        label: 'INDO NEWS',     accentD: '#FFB300', accentL: '#886600' },
  { id: 'crypto-news',      label: 'CRYPTO',        accentD: '#CC44FF', accentL: '#6600AA' },
  { id: 'blockchain-news',  label: 'BLOCKCHAIN',    accentD: '#00FFCC', accentL: '#006655' },
];

// ── State ──
let currentCat    = localStorage.getItem('lim-ai-cat') || 'ai-news';
let currentDate   = null;
let activeFilter  = null;

const PRIORITY_LABEL = { 1: 'MAJOR', 2: 'SIGNIFICANT', 3: 'NOTABLE', 4: 'FYI' };

// ══════════════════════════════════════════════════════════════
//  ACCENT
// ══════════════════════════════════════════════════════════════
function getAccent(catId) {
  const cat = CATEGORIES.find(c => c.id === catId) || CATEGORIES[0];
  return getTheme() === 'light' ? cat.accentL : cat.accentD;
}

function applyAccent(catId) {
  const color = getAccent(catId);
  const root = document.documentElement;
  root.style.setProperty('--accent',  color);
  root.style.setProperty('--accent2', color);
}

// ══════════════════════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════════════════════
function getTheme() { return document.documentElement.getAttribute('data-theme') || 'dark'; }
function toggleTheme() {
  const next = getTheme() === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀ LIGHT' : '☾ DARK';
  localStorage.setItem('lim-ai-theme', next);
  applyAccent(currentCat);
  updateFilterChipColors();
}
function initTheme() {
  const saved = localStorage.getItem('lim-ai-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('theme-toggle').textContent = saved === 'dark' ? '☀ LIGHT' : '☾ DARK';
}

// ══════════════════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const d = now.toISOString().slice(0, 10);
  const t = now.toTimeString().slice(0, 8);
  const el = document.getElementById('tb-clock');
  if (el) el.innerHTML = `<span class="tb-date">${d}</span> &nbsp;${t}`;
}
updateClock();
setInterval(updateClock, 1000);

// ══════════════════════════════════════════════════════════════
//  CATEGORY BAR
// ══════════════════════════════════════════════════════════════
function buildCatBar() {
  const bar = document.getElementById('catbar');
  bar.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const tab = document.createElement('div');
    tab.className = 'cat-tab' + (cat.id === currentCat ? ' active' : '');
    tab.dataset.id = cat.id;
    tab.textContent = cat.label;
    if (cat.id === currentCat) {
      tab.style.background = getAccent(cat.id);
      tab.style.borderBottomColor = 'transparent';
    }
    tab.onclick = () => switchCategory(cat.id);
    bar.appendChild(tab);
  });
}

function switchCategory(catId) {
  if (catId === currentCat) return;
  currentCat = catId;
  activeFilter = null;
  localStorage.setItem('lim-ai-cat', catId);
  applyAccent(catId);
  // Update tab styles
  document.querySelectorAll('.cat-tab').forEach(t => {
    const isActive = t.dataset.id === catId;
    t.classList.toggle('active', isActive);
    t.style.background   = isActive ? getAccent(catId) : '';
    t.style.color        = isActive ? '' : '';
  });
  loadCategory(catId);
}

// ══════════════════════════════════════════════════════════════
//  LOAD CATEGORY DATA
// ══════════════════════════════════════════════════════════════
function loadCategory(catId) {
  const data = (window.LIM_DATA || {})[catId];
  const briefs = data && data.briefs && data.briefs.length > 0 ? data.briefs : null;

  // Show / hide no-data state
  document.getElementById('no-data').style.display   = briefs ? 'none' : 'block';
  document.getElementById('brief-hdr').style.display = briefs ? '' : 'none';
  document.getElementById('signal-box').style.display = briefs ? '' : 'none';
  document.getElementById('stories-wrap').style.display = briefs ? '' : 'none';
  document.getElementById('quick-hits').style.display = briefs ? '' : 'none';
  document.getElementById('empty-state').style.display = 'none';

  if (!briefs) {
    document.getElementById('tb-stats').innerHTML = '';
    document.getElementById('date-list').innerHTML = '';
    document.getElementById('mobile-datebar').innerHTML = '';
    document.getElementById('filter-chips').innerHTML = '';
    return;
  }

  const reversed = briefs.slice().reverse();
  renderSidebar(reversed);
  renderMobileDateBar(reversed);
  renderFilterChips(briefs);
  loadBrief(briefs[briefs.length - 1].date, briefs);
}

// ══════════════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════════════
function renderSidebar(briefs) {
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  briefs.forEach(b => {
    const el = document.createElement('div');
    el.className = 'date-item';
    el.dataset.date = b.date;
    el.innerHTML = `
      <div class="di-date">${b.date}</div>
      <div class="di-headline">${b.indexHeadline}</div>
      <div class="di-badges">
        ${b.stats.major > 0 ? `<span class="di-badge major">🔴 ${b.stats.major} MAJOR</span>` : ''}
        ${b.stats.significant > 0 ? `<span class="di-badge sig">🟠 ${b.stats.significant} SIG</span>` : ''}
      </div>`;
    el.onclick = () => {
      const data = (window.LIM_DATA || {})[currentCat];
      loadBrief(b.date, data ? data.briefs : []);
      closeSidebar();
    };
    list.appendChild(el);
  });
}

function renderMobileDateBar(briefs) {
  const bar = document.getElementById('mobile-datebar');
  bar.innerHTML = '';
  briefs.forEach(b => {
    const chip = document.createElement('div');
    chip.className = 'mob-date-chip';
    chip.dataset.date = b.date;
    chip.textContent = b.date;
    chip.onclick = () => {
      const data = (window.LIM_DATA || {})[currentCat];
      loadBrief(b.date, data ? data.briefs : []);
    };
    bar.appendChild(chip);
  });
}

// ══════════════════════════════════════════════════════════════
//  FILTER CHIPS
// ══════════════════════════════════════════════════════════════
function renderFilterChips(briefs) {
  const container = document.getElementById('filter-chips');
  container.innerHTML = '';
  const cats = [...new Set(briefs.flatMap(b => b.stories.map(s => s.category)))].sort();
  cats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.cat = cat;
    chip.textContent = cat;
    chip.onclick = () => toggleFilter(cat);
    container.appendChild(chip);
  });
  activeFilter = null;
}

function updateFilterChipColors() {
  if (!activeFilter) return;
  document.querySelectorAll('.chip').forEach(c => {
    if (c.dataset.cat === activeFilter) c.style.background = getAccent(currentCat);
  });
}

function toggleFilter(cat) {
  activeFilter = activeFilter === cat ? null : cat;
  document.querySelectorAll('.chip').forEach(c => {
    const isActive = c.dataset.cat === activeFilter;
    c.classList.toggle('active', isActive);
    c.style.background  = isActive ? getAccent(currentCat) : '';
    c.style.color       = isActive ? '' : '';
    c.style.borderColor = isActive ? getAccent(currentCat) : '';
  });
  applyFilter();
}

function applyFilter() {
  let visible = 0;
  document.querySelectorAll('.story-card').forEach(card => {
    const match = !activeFilter || card.dataset.cat === activeFilter;
    card.classList.toggle('filtered-out', !match);
    if (match) visible++;
  });
  document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
}

// ══════════════════════════════════════════════════════════════
//  LOAD BRIEF
// ══════════════════════════════════════════════════════════════
function loadBrief(date, briefs) {
  currentDate = date;
  const brief = briefs.find(b => b.date === date);
  if (!brief) return;

  document.querySelectorAll('.date-item').forEach(el =>
    el.classList.toggle('active', el.dataset.date === date));
  document.querySelectorAll('.mob-date-chip').forEach(el =>
    el.classList.toggle('active', el.dataset.date === date));

  document.getElementById('tb-stats').innerHTML = `
    <span>${brief.stats.total} STORIES</span><span>·</span>
    <span class="s-major">🔴 ${brief.stats.major}</span><span>·</span>
    <span class="s-sig">🟠 ${brief.stats.significant}</span>`;

  document.getElementById('brief-hdr').innerHTML = `
    <div class="bh-date">NEWS BRIEF — ${date}</div>
    <div class="bh-headline">${brief.indexHeadline}</div>
    <div class="bh-summary">${brief.indexSummary}</div>
    <div class="bh-stats">
      <div class="bh-stat total"><span class="num">${brief.stats.total}</span> STORIES</div>
      <div class="bh-stat major"><span class="num">${brief.stats.major}</span> MAJOR</div>
      <div class="bh-stat sig"><span class="num">${brief.stats.significant}</span> SIGNIFICANT</div>
    </div>`;

  document.getElementById('signal-box').innerHTML = `
    <div class="signal-hdr">▶ TODAY'S SIGNAL</div>
    ${brief.topSignal.map((s, i) => `
      <div class="signal-item">
        <div class="signal-bullet">0${i+1}</div>
        <div>
          <div class="signal-headline">${s.headline}</div>
          <div class="signal-detail">${s.detail}</div>
        </div>
      </div>`).join('')}`;

  const wrap = document.getElementById('stories-wrap');
  wrap.innerHTML = `<div class="stories-hdr">TOP STORIES</div>`;
  const accent = getAccent(currentCat);

  brief.stories.forEach((s, idx) => {
    const card = document.createElement('div');
    card.className = 'story-card' + (idx === 0 ? ' open' : '');
    card.dataset.cat = s.category;
    card.innerHTML = `
      <div class="story-head" onclick="toggleStory(this.parentElement)">
        <div class="story-meta">
          <span class="cat-badge" style="background:${accent}22;color:${accent};border-color:${accent}44">${s.category}</span>
          <span class="priority-dot p${s.priorityLevel}"></span>
          <span class="priority-label p${s.priorityLevel}-txt">${PRIORITY_LABEL[s.priorityLevel]}</span>
          ${s.tags.map(t => `<span class="tag-pill">#${t}</span>`).join('')}
          <span class="expand-arrow">▼</span>
        </div>
        <div class="story-title">${s.id}. ${s.title}</div>
        <div class="story-subtitle">
          <span class="story-event-date">EVENT: ${s.eventDate}</span>
          <span class="story-sources">
            ${s.sources.map(src =>
              `<a class="story-src-link" href="${src.url}" target="_blank" rel="noopener">[${src.name}]</a>`
            ).join('')}
          </span>
        </div>
      </div>
      <div class="story-body">
        <div class="story-section"><div class="ss-label">WHAT HAPPENED</div><div class="ss-text">${s.whatHappened}</div></div>
        <div class="story-section"><div class="ss-label">WHAT IT CAN DO</div><ul class="ss-list ss-cando">${s.whatItCanDo.map(x=>`<li>${x}</li>`).join('')}</ul></div>
        <div class="story-section"><div class="ss-label">WHAT'S THE CATCH</div><ul class="ss-list ss-catch">${s.whatsCatch.map(x=>`<li>${x}</li>`).join('')}</ul></div>
        <div class="story-section"><div class="ss-label">KEY TAKEAWAY</div><div class="takeaway-box"><div class="ss-text">${s.keyTakeaway}</div></div></div>
        <div class="story-section"><div class="ss-label">HOW IT CAN IMPROVE</div><div class="ss-text">${s.howToImprove}</div></div>
        <div class="story-section"><div class="ss-label">VS. PREVIOUS COVERAGE</div><div class="vs-box">${s.vsPrevious}</div></div>
      </div>`;
    wrap.appendChild(card);
  });

  document.getElementById('quick-hits').innerHTML = `
    <div class="qh-hdr">QUICK HITS</div>
    <div class="qh-list">
      ${brief.quickHits.map(q => `
        <div class="qh-item">
          <div class="qh-bullet">◆</div>
          <div>
            <div class="qh-title">${q.title}</div>
            <div class="qh-text">${q.text}</div>
            <a class="qh-link" href="${q.url}" target="_blank" rel="noopener">→ SOURCE</a>
          </div>
        </div>`).join('')}
    </div>`;

  document.getElementById('main').scrollTo(0, 0);
  window.scrollTo(0, 0);
  applyFilter();
}

function toggleStory(card) { card.classList.toggle('open'); }

// ══════════════════════════════════════════════════════════════
//  MOBILE SIDEBAR
// ══════════════════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ══════════════════════════════════════════════════════════════
//  ALOHA SPLASH
// ══════════════════════════════════════════════════════════════
function showSplash() {
  const el = document.getElementById('aloha');
  // Set accent color on splash text
  el.querySelector('.aloha-text').style.color = getAccent(currentCat);
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => { el.style.display = 'none'; }, 650);
  }, 1500);
}

// ══════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════
function init() {
  initTheme();
  applyAccent(currentCat);
  buildCatBar();
  loadCategory(currentCat);
  showSplash();
}

init();
</script>
</body>
</html>
