<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIM-AI TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Apply saved theme before first paint (no flash) -->
  <script>(function(){var t=localStorage.getItem('lim-ai-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>

  <!-- Supabase SDK + auth config -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════════════
       DARK MODE  (default)
    ══════════════════════════════════════ */
    :root, [data-theme="dark"] {
      --bg:        #000000;
      --bg2:       #0d0d0d;
      --bg3:       #141414;
      --bg4:       #1a1a1a;
      --border:    #222222;
      --border2:   #2e2e2e;

      --orange:    #FF6600;
      --orange2:   #FF8800;
      --green:     #00FF88;
      --green2:    #00CC66;
      --red:       #FF1744;
      --red2:      #FF5252;
      --amber:     #FFB300;
      --cyan:      #00E5FF;
      --purple:    #CC44FF;
      --teal:      #00FFCC;
      --blue:      #4488FF;

      --text:      #F0F0F0;
      --text2:     #AAAAAA;
      --dim:       #555555;

      --topbar-bg: #0d0d0d;
      --topbar-bd: #FF6600;
      --sidebar-bg: #0d0d0d;
      --card-bg:   #0d0d0d;
      --card-hover: #141414;
      --signal-bd: #FF6600;
    }

    /* ══════════════════════════════════════
       LIGHT MODE
    ══════════════════════════════════════ */
    [data-theme="light"] {
      --bg:        #FFFFFF;
      --bg2:       #F5F5F5;
      --bg3:       #EBEBEB;
      --bg4:       #E0E0E0;
      --border:    #D0D0D0;
      --border2:   #BBBBBB;

      --orange:    #CC4400;
      --orange2:   #AA3300;
      --green:     #006633;
      --green2:    #004D26;
      --red:       #CC0022;
      --red2:      #AA0011;
      --amber:     #886600;
      --cyan:      #0066AA;
      --purple:    #6600AA;
      --teal:      #006655;
      --blue:      #0044CC;

      --text:      #0D0D0D;
      --text2:     #444444;
      --dim:       #888888;

      --topbar-bg: #F5F5F5;
      --topbar-bd: #CC4400;
      --sidebar-bg: #F5F5F5;
      --card-bg:   #FFFFFF;
      --card-hover: #F5F5F5;
      --signal-bd: #CC4400;
    }

    /* ── Base ── */
    :root {
      --font:    'IBM Plex Mono', 'Courier New', monospace;
      --sidebar: 230px;
      --topbar:  44px;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ══════════════════════════════════════
       AUTH SCREEN
    ══════════════════════════════════════ */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: background 0.2s;
    }
    #auth-theme-btn {
      position: absolute;
      top: 14px; right: 14px;
      background: none;
      border: 1px solid var(--border2);
      border-radius: 3px;
      cursor: pointer;
      padding: 4px 8px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }
    #auth-theme-btn:hover { border-color: var(--orange); color: var(--orange); }
    #auth-box {
      width: 380px;
      max-width: calc(100vw - 32px);
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-top: 3px solid var(--orange);
    }
    .auth-logo {
      padding: 26px 28px 4px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--orange);
    }
    .auth-subtitle {
      padding: 0 28px 18px;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--dim);
      font-weight: 700;
    }
    .auth-tabs {
      display: flex;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1px;
    }
    .auth-tab:hover { color: var(--text2); }
    .auth-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
    .auth-form { padding: 20px 28px 26px; }
    .auth-field { margin-bottom: 16px; }
    .auth-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--dim);
      margin-bottom: 6px;
    }
    .auth-input-wrap { position: relative; }
    .auth-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .auth-input:focus { border-color: var(--orange); }
    .auth-input::placeholder { color: var(--dim); }
    .auth-input.with-toggle { padding-right: 38px; }
    .auth-pw-toggle {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--dim); cursor: pointer;
      font-size: 13px; padding: 2px;
      line-height: 1;
    }
    .auth-pw-toggle:hover { color: var(--text2); }
    #auth-error, #auth-success {
      display: none;
      margin-bottom: 14px;
      font-size: 11px;
      padding: 8px 10px;
      line-height: 1.6;
    }
    #auth-error {
      color: var(--red2);
      background: rgba(255,23,68,0.08);
      border: 1px solid rgba(255,23,68,0.2);
    }
    #auth-success {
      color: var(--green);
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.2);
    }
    [data-theme="light"] #auth-error   { background: rgba(204,0,34,0.06);   border-color: rgba(204,0,34,0.18); }
    [data-theme="light"] #auth-success { background: rgba(0,102,51,0.06);   border-color: rgba(0,102,51,0.18); }
    #auth-submit {
      width: 100%;
      background: var(--orange);
      color: #000;
      border: none;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      padding: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 14px;
    }
    #auth-submit:hover:not(:disabled) { opacity: 0.82; }
    #auth-submit:disabled { opacity: 0.45; cursor: not-allowed; }
    .auth-footer {
      font-size: 10px;
      color: var(--dim);
      text-align: center;
      line-height: 1.8;
    }
    /* Setup-needed state */
    .auth-setup-msg {
      padding: 22px 28px 28px;
      font-size: 11px;
      color: var(--text2);
      line-height: 2;
    }
    .auth-setup-msg code { color: var(--orange); font-family: var(--font); }
    .auth-setup-step {
      margin-top: 10px;
      padding-left: 14px;
      border-left: 2px solid var(--border2);
    }
    .auth-setup-step li { margin-bottom: 4px; list-style: none; padding-left: 0; }
    .auth-setup-step li::before { content: '→ '; color: var(--orange); }

    /* ── Top Bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar);
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--topbar-bd);
      align-items: center;
      padding: 0 14px;
      gap: 12px;
      z-index: 100;
      user-select: none;
    }
    .tb-brand {
      color: var(--orange);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }
    .tb-brand span { color: var(--text); }
    .tb-divider { width: 1px; height: 22px; background: var(--border2); flex-shrink: 0; }
    .tb-live {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--green); font-weight: 600; letter-spacing: 0.1em;
    }
    .tb-live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .tb-stats {
      display: flex; gap: 10px; align-items: center;
      font-size: 11px; color: var(--text2); white-space: nowrap;
    }
    .tb-stats .s-major { color: var(--red); font-weight: 600; }
    .tb-stats .s-sig   { color: var(--orange); font-weight: 600; }
    .tb-clock {
      font-size: 12px; color: var(--text2); white-space: nowrap;
    }
    .tb-date { color: var(--orange2); font-weight: 600; }
    .tb-user {
      font-size: 10px; color: var(--dim); white-space: nowrap;
      max-width: 160px; overflow: hidden; text-overflow: ellipsis;
    }
    .tb-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    /* Theme toggle + Logout */
    #theme-toggle, #logout-btn {
      background: none; border: 1px solid var(--border2);
      border-radius: 3px; cursor: pointer; padding: 4px 8px;
      font-family: var(--font); font-size: 11px; font-weight: 600;
      color: var(--text2); letter-spacing: 0.05em;
      transition: all 0.15s; flex-shrink: 0;
    }
    #theme-toggle:hover { border-color: var(--orange); color: var(--orange); }
    #logout-btn:hover   { border-color: var(--red2);   color: var(--red2); }

    /* Hamburger */
    #hamburger {
      display: none; background: none; border: none; cursor: pointer;
      color: var(--orange); font-size: 18px; padding: 4px; flex-shrink: 0;
    }

    /* ── Layout ── */
    #layout {
      display: flex;
      position: fixed;
      top: var(--topbar); left: 0; right: 0; bottom: 0;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform 0.25s ease, background 0.2s;
    }
    .sidebar-hdr {
      padding: 10px 12px 8px;
      font-size: 10px; font-weight: 700;
      color: var(--dim); letter-spacing: 0.15em;
      border-bottom: 1px solid var(--border);
    }
    #date-list { overflow-y: auto; flex: 1; padding: 6px 0; }
    .date-item {
      padding: 8px 12px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .date-item:hover { background: var(--bg3); }
    .date-item.active { border-left-color: var(--orange); background: var(--bg3); }
    .di-date {
      font-size: 11px; font-weight: 600; color: var(--orange2); letter-spacing: 0.05em;
    }
    .date-item.active .di-date { color: var(--orange); }
    .di-headline {
      font-size: 10px; color: var(--text2); line-height: 1.4; margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .di-badges { display: flex; gap: 4px; margin-top: 5px; }
    .di-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 2px;
    }
    [data-theme="dark"] .di-badge.major { background: rgba(255,23,68,0.18); color: var(--red2); }
    [data-theme="dark"] .di-badge.sig   { background: rgba(255,102,0,0.18); color: var(--orange); }
    [data-theme="light"] .di-badge.major { background: rgba(204,0,34,0.1); color: var(--red2); border: 1px solid rgba(204,0,34,0.2); }
    [data-theme="light"] .di-badge.sig   { background: rgba(204,68,0,0.1); color: var(--orange); border: 1px solid rgba(204,68,0,0.2); }

    /* Filters */
    .sidebar-filters { border-top: 1px solid var(--border); padding: 8px; }
    .filter-hdr {
      font-size: 10px; font-weight: 700; color: var(--dim);
      letter-spacing: 0.12em; margin-bottom: 6px;
    }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
      padding: 3px 7px; border-radius: 2px; cursor: pointer;
      border: 1px solid var(--border2); color: var(--text2);
      background: var(--bg3); transition: all 0.15s;
    }
    .chip:hover { border-color: var(--text2); color: var(--text); }
    .chip.active { color: var(--bg) !important; }

    /* ── Main ── */
    #main {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 18px 20px 40px;
    }

    /* Brief Header */
    #brief-hdr { border-bottom: 1px solid var(--border2); padding-bottom: 12px; margin-bottom: 16px; }
    .bh-date {
      font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
      color: var(--orange); margin-bottom: 4px;
    }
    .bh-headline { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .bh-summary { font-size: 11px; color: var(--text2); margin-top: 6px; line-height: 1.6; }
    .bh-stats { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
    .bh-stat { font-size: 10px; display: flex; align-items: center; gap: 5px; }
    .bh-stat .num { font-weight: 700; font-size: 13px; }
    .bh-stat.total .num { color: var(--text); }
    .bh-stat.major .num { color: var(--red); }
    .bh-stat.sig   .num { color: var(--orange); }

    /* Signal Box */
    #signal-box {
      background: var(--bg2); border: 1px solid var(--border2);
      border-left: 3px solid var(--signal-bd);
      border-radius: 2px; padding: 12px 14px; margin-bottom: 20px;
    }
    .signal-hdr {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      color: var(--orange); margin-bottom: 10px;
    }
    .signal-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 6px 0; border-bottom: 1px solid var(--border);
    }
    .signal-item:last-child { border-bottom: none; padding-bottom: 0; }
    .signal-bullet { font-size: 14px; color: var(--orange); flex-shrink: 0; line-height: 1.2; }
    .signal-headline { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .signal-detail { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.5; }

    /* Story Cards */
    .stories-hdr {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      color: var(--dim); margin-bottom: 12px;
    }
    .story-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 2px; margin-bottom: 10px; overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
    }
    .story-card:hover { background: var(--card-hover); }
    .story-card.filtered-out { display: none; }

    .story-head {
      padding: 12px 14px; cursor: pointer;
      display: flex; flex-direction: column; gap: 7px;
    }
    .story-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .cat-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      padding: 2px 7px; border-radius: 2px;
    }

    /* Dark badge styles */
    [data-theme="dark"] .cat-POLICY   { background: rgba(204,68,255,0.15); color: var(--purple); border: 1px solid rgba(204,68,255,0.3); }
    [data-theme="dark"] .cat-PEOPLE   { background: rgba(0,229,255,0.12); color: var(--cyan); border: 1px solid rgba(0,229,255,0.25); }
    [data-theme="dark"] .cat-SAFETY   { background: rgba(255,23,68,0.15); color: var(--red2); border: 1px solid rgba(255,23,68,0.3); }
    [data-theme="dark"] .cat-BUSINESS { background: rgba(0,255,136,0.12); color: var(--green); border: 1px solid rgba(0,255,136,0.25); }
    [data-theme="dark"] .cat-PRODUCT  { background: rgba(68,136,255,0.15); color: var(--blue); border: 1px solid rgba(68,136,255,0.3); }
    [data-theme="dark"] .cat-MODEL    { background: rgba(255,102,0,0.15); color: var(--orange); border: 1px solid rgba(255,102,0,0.3); }
    [data-theme="dark"] .cat-TOOL     { background: rgba(0,255,204,0.12); color: var(--teal); border: 1px solid rgba(0,255,204,0.25); }
    [data-theme="dark"] .cat-RESEARCH { background: rgba(204,68,255,0.12); color: var(--purple); border: 1px solid rgba(204,68,255,0.25); }

    /* Light badge styles */
    [data-theme="light"] .cat-POLICY   { background: rgba(102,0,170,0.08); color: var(--purple); border: 1px solid rgba(102,0,170,0.2); }
    [data-theme="light"] .cat-PEOPLE   { background: rgba(0,102,170,0.08); color: var(--cyan); border: 1px solid rgba(0,102,170,0.2); }
    [data-theme="light"] .cat-SAFETY   { background: rgba(204,0,34,0.08); color: var(--red); border: 1px solid rgba(204,0,34,0.2); }
    [data-theme="light"] .cat-BUSINESS { background: rgba(0,102,51,0.08); color: var(--green); border: 1px solid rgba(0,102,51,0.2); }
    [data-theme="light"] .cat-PRODUCT  { background: rgba(0,68,204,0.08); color: var(--blue); border: 1px solid rgba(0,68,204,0.2); }
    [data-theme="light"] .cat-MODEL    { background: rgba(204,68,0,0.08); color: var(--orange); border: 1px solid rgba(204,68,0,0.2); }
    [data-theme="light"] .cat-TOOL     { background: rgba(0,102,85,0.08); color: var(--teal); border: 1px solid rgba(0,102,85,0.2); }
    [data-theme="light"] .cat-RESEARCH { background: rgba(102,0,170,0.08); color: var(--purple); border: 1px solid rgba(102,0,170,0.2); }

    .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .p1 { background: var(--red);    box-shadow: 0 0 6px color-mix(in srgb, var(--red) 50%, transparent); }
    .p2 { background: var(--orange); box-shadow: 0 0 6px color-mix(in srgb, var(--orange) 40%, transparent); }
    .p3 { background: var(--amber); }
    .p4 { background: var(--dim); }

    .priority-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; }
    .p1-txt { color: var(--red); }
    .p2-txt { color: var(--orange); }
    .p3-txt { color: var(--amber); }

    .tag-pill {
      font-size: 9px; color: var(--dim); letter-spacing: 0.05em;
      border: 1px solid var(--border); padding: 1px 5px; border-radius: 2px;
    }
    .story-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .story-subtitle { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .story-event-date { font-size: 10px; color: var(--dim); }
    .story-sources { display: flex; gap: 6px; flex-wrap: wrap; }
    .story-src-link {
      font-size: 10px; color: var(--blue); text-decoration: none; transition: color 0.15s;
    }
    .story-src-link:hover { color: var(--cyan); text-decoration: underline; }
    .expand-arrow {
      font-size: 10px; color: var(--dim); margin-left: auto; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .story-card.open .expand-arrow { transform: rotate(180deg); }

    /* Story Body */
    .story-body { display: none; border-top: 1px solid var(--border); }
    .story-card.open .story-body { display: block; }
    .story-section { padding: 11px 14px; border-bottom: 1px solid var(--border); }
    .story-section:last-child { border-bottom: none; }
    .ss-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.15em; color: var(--dim);
      margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
    }
    .ss-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .ss-text { font-size: 11px; color: var(--text2); line-height: 1.7; }
    .ss-list { list-style: none; padding: 0; }
    .ss-list li {
      font-size: 11px; color: var(--text2); line-height: 1.6;
      padding-left: 14px; position: relative; margin-bottom: 3px;
    }
    .ss-list li::before { position: absolute; left: 0; font-size: 9px; top: 3px; }
    .ss-catch li::before { content: '✗'; color: var(--red); }
    .ss-cando li::before { content: '✓'; color: var(--green); }
    .takeaway-box {
      background: var(--bg3); border-left: 3px solid var(--orange);
      padding: 9px 12px; border-radius: 0 2px 2px 0; margin-top: 4px;
    }
    .takeaway-box .ss-text { color: var(--text); font-style: italic; font-size: 12px; }
    .vs-box {
      font-size: 11px; color: var(--dim); background: var(--bg3);
      padding: 6px 10px; border-radius: 2px; border: 1px solid var(--border); font-style: italic;
    }

    /* Quick Hits */
    #quick-hits { margin-top: 24px; }
    .qh-hdr {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--dim);
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .qh-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .qh-list { display: flex; flex-direction: column; gap: 6px; }
    .qh-item {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 2px; padding: 9px 12px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .qh-bullet { color: var(--orange); flex-shrink: 0; font-size: 10px; margin-top: 2px; }
    .qh-title { font-size: 11px; font-weight: 700; color: var(--text); }
    .qh-text  { font-size: 11px; color: var(--text2); margin-top: 1px; line-height: 1.5; }
    .qh-link  {
      font-size: 10px; color: var(--blue); text-decoration: none;
      margin-top: 2px; display: inline-block;
    }
    .qh-link:hover { color: var(--cyan); text-decoration: underline; }

    /* Empty state */
    #empty-state {
      display: none; padding: 40px 20px; text-align: center;
      color: var(--dim); font-size: 12px; line-height: 2;
    }

    /* Mobile date bar */
    #mobile-datebar {
      display: none; overflow-x: auto; padding: 8px 12px; gap: 6px;
      border-bottom: 1px solid var(--border); background: var(--bg2);
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      margin: -18px -12px 14px;
    }
    #mobile-datebar::-webkit-scrollbar { display: none; }
    .mob-date-chip {
      flex-shrink: 0; padding: 5px 10px; border-radius: 2px; cursor: pointer;
      font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
      border: 1px solid var(--border2); color: var(--text2);
      background: var(--bg3); white-space: nowrap; transition: all 0.15s;
    }
    .mob-date-chip.active { background: var(--orange); color: var(--bg); border-color: var(--orange); }

    /* Sidebar overlay (mobile) */
    #sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 90;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      html, body { font-size: 12px; overflow: auto; }
      #layout { position: static; flex-direction: column; height: auto; overflow: visible; }
      #main { overflow: visible; padding: 12px 12px 40px; }
      #sidebar {
        position: fixed;
        top: var(--topbar); left: 0; bottom: 0;
        z-index: 95; width: 260px;
        transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; }
      #mobile-datebar { display: flex; }
      #hamburger { display: block; }
      .tb-stats { display: none; }
      .tb-user  { display: none; }
      .bh-headline { font-size: 13px; }
      .story-title { font-size: 12px; }
      #auth-box { width: 100%; max-width: 100%; }
      #auth-screen { align-items: flex-start; padding-top: 60px; }
      .auth-logo { font-size: 14px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     AUTH SCREEN
═══════════════════════════════════════════════════════ -->
<div id="auth-screen">
  <button id="auth-theme-btn" onclick="toggleTheme()">☀ LIGHT</button>

  <div id="auth-box">
    <div class="auth-logo">▌ LIM-AI TERMINAL</div>
    <div class="auth-subtitle">RESTRICTED ACCESS</div>

    <div class="auth-tabs" id="auth-tabs">
      <button class="auth-tab active" data-mode="login"    onclick="setAuthMode('login')">LOGIN</button>
      <button class="auth-tab"        data-mode="register" onclick="setAuthMode('register')">REGISTER</button>
    </div>

    <div class="auth-form" id="auth-form">
      <div id="auth-error"></div>
      <div id="auth-success"></div>

      <div class="auth-field">
        <label class="auth-label" for="auth-email">EMAIL</label>
        <input class="auth-input" id="auth-email" type="email"
               placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="auth-field">
        <label class="auth-label" for="auth-password">PASSWORD</label>
        <div class="auth-input-wrap">
          <input class="auth-input with-toggle" id="auth-password" type="password"
                 placeholder="••••••••" autocomplete="current-password">
          <button class="auth-pw-toggle" onclick="togglePwVis()" title="Show / hide">👁</button>
        </div>
      </div>

      <button id="auth-submit" onclick="handleAuth()">LOGIN</button>

      <div class="auth-footer" id="auth-footer">
        Access is by invitation only.<br>Contact the administrator to register.
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     TERMINAL  (hidden until logged in)
═══════════════════════════════════════════════════════ -->
<header id="topbar" style="display:none">
  <button id="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="tb-brand">LIM<span>-</span>AI <span style="opacity:0.4">TERMINAL</span></div>
  <div class="tb-divider"></div>
  <div class="tb-live"><div class="tb-live-dot"></div>LIVE</div>
  <div class="tb-stats" id="tb-stats"></div>
  <div class="tb-right">
    <div class="tb-clock" id="tb-clock"></div>
    <div class="tb-divider"></div>
    <div class="tb-user" id="tb-user"></div>
    <button id="theme-toggle" onclick="toggleTheme()">☀ LIGHT</button>
    <button id="logout-btn"   onclick="logout()">⏏ LOGOUT</button>
  </div>
</header>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="layout" style="display:none">
  <aside id="sidebar">
    <div class="sidebar-hdr">ARCHIVE</div>
    <div id="date-list"></div>
    <div class="sidebar-filters">
      <div class="filter-hdr">FILTER BY CATEGORY</div>
      <div class="filter-chips" id="filter-chips"></div>
    </div>
  </aside>

  <main id="main">
    <div id="mobile-datebar"></div>
    <div id="brief-hdr"></div>
    <div id="signal-box"></div>
    <div id="stories-wrap"></div>
    <div id="quick-hits"></div>
    <div id="empty-state">NO STORIES MATCH THE ACTIVE FILTER.<br>CLICK A CATEGORY TO CLEAR.</div>
  </main>
</div>

<script src="data.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════
let _sb = null;
let _authMode = 'login';
let _terminalInited = false;

function _initSupabase() {
  if (typeof SUPABASE_URL === 'undefined' || SUPABASE_URL === 'YOUR_SUPABASE_PROJECT_URL') {
    _showSetupNeeded();
    return false;
  }
  try {
    _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    return true;
  } catch(e) {
    _showSetupNeeded();
    return false;
  }
}

function _showSetupNeeded() {
  document.getElementById('auth-tabs').style.display = 'none';
  document.getElementById('auth-form').innerHTML = `
    <div class="auth-setup-msg">
      Auth is not configured yet.<br>
      Open <code>website/config.js</code> and fill in your Supabase credentials.
      <ul class="auth-setup-step" style="margin-top:14px">
        <li>Go to <code>supabase.com</code> → create a free project</li>
        <li>Settings → API → copy Project URL + anon key</li>
        <li>Paste into <code>config.js</code></li>
        <li>Reload this page</li>
      </ul>
    </div>`;
}

async function initAuth() {
  if (!_initSupabase()) return;

  const { data: { session } } = await _sb.auth.getSession();
  if (session) {
    _showTerminal(session.user);
  } else {
    _showAuthScreen();
  }

  _sb.auth.onAuthStateChange((event, session) => {
    if (session) {
      _showTerminal(session.user);
    } else {
      _showAuthScreen();
    }
  });
}

function _showTerminal(user) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('layout').style.display = 'flex';
  if (user) document.getElementById('tb-user').textContent = user.email;
  if (!_terminalInited) {
    _terminalInited = true;
    init();
  }
}

function _showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('layout').style.display = 'none';
  _terminalInited = false;
  // Sync theme button label on auth screen
  const t = getTheme();
  const btn = document.getElementById('auth-theme-btn');
  if (btn) btn.textContent = t === 'dark' ? '☀ LIGHT' : '☾ DARK';
}

function setAuthMode(mode) {
  _authMode = mode;
  document.querySelectorAll('.auth-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('auth-submit').textContent = mode === 'login' ? 'LOGIN' : 'REGISTER';
  _clearAuthMessages();
}

async function handleAuth() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  _clearAuthMessages();

  if (!email || !password) { _authError('Email and password are required.'); return; }
  if (password.length < 6) { _authError('Password must be at least 6 characters.'); return; }

  const btn = document.getElementById('auth-submit');
  btn.textContent = 'LOADING...';
  btn.disabled = true;

  try {
    if (_authMode === 'login') {
      const { error } = await _sb.auth.signInWithPassword({ email, password });
      if (error) _authError(error.message);
    } else {
      const { error } = await _sb.auth.signUp({ email, password });
      if (error) {
        _authError(error.message);
      } else {
        _authSuccess('Registered! Check your email to confirm your account, then log in.');
        setAuthMode('login');
      }
    }
  } catch(e) {
    _authError('Connection error — please try again.');
  } finally {
    btn.textContent = _authMode === 'login' ? 'LOGIN' : 'REGISTER';
    btn.disabled = false;
  }
}

async function logout() {
  if (_sb) await _sb.auth.signOut();
}

function togglePwVis() {
  const inp = document.getElementById('auth-password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function _authError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = '✗ ' + msg;
  el.style.display = 'block';
}
function _authSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = '✓ ' + msg;
  el.style.display = 'block';
}
function _clearAuthMessages() {
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

// Enter key support in auth form
document.getElementById('auth-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('auth-password').focus();
});
document.getElementById('auth-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleAuth();
});

// ═══════════════════════════════════════════════════════
//  TERMINAL
// ═══════════════════════════════════════════════════════
let currentDate  = null;
let activeFilter = null;

const CAT_CONFIG = {
  POLICY:   { color: '#CC44FF' },
  PEOPLE:   { color: '#00E5FF' },
  SAFETY:   { color: '#FF5252' },
  BUSINESS: { color: '#00FF88' },
  PRODUCT:  { color: '#4488FF' },
  MODEL:    { color: '#FF6600' },
  TOOL:     { color: '#00FFCC' },
  RESEARCH: { color: '#CC44FF' },
};
const CAT_CONFIG_LIGHT = {
  POLICY:   { color: '#6600AA' },
  PEOPLE:   { color: '#0066AA' },
  SAFETY:   { color: '#CC0022' },
  BUSINESS: { color: '#006633' },
  PRODUCT:  { color: '#0044CC' },
  MODEL:    { color: '#CC4400' },
  TOOL:     { color: '#006655' },
  RESEARCH: { color: '#6600AA' },
};

const PRIORITY_LABEL = { 1: 'MAJOR', 2: 'SIGNIFICANT', 3: 'NOTABLE', 4: 'FYI' };

// ── Theme ──
function getTheme() { return document.documentElement.getAttribute('data-theme') || 'dark'; }
function toggleTheme() {
  const next = getTheme() === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  const label = next === 'dark' ? '☀ LIGHT' : '☾ DARK';
  const tt = document.getElementById('theme-toggle');
  const ab = document.getElementById('auth-theme-btn');
  if (tt) tt.textContent = label;
  if (ab) ab.textContent = label;
  localStorage.setItem('lim-ai-theme', next);
  updateFilterChipColors();
}
function initTheme() {
  const saved = localStorage.getItem('lim-ai-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const label = saved === 'dark' ? '☀ LIGHT' : '☾ DARK';
  const tt = document.getElementById('theme-toggle');
  const ab = document.getElementById('auth-theme-btn');
  if (tt) tt.textContent = label;
  if (ab) ab.textContent = label;
}

// ── Clock ──
function updateClock() {
  const now = new Date();
  const d = now.toISOString().slice(0, 10);
  const t = now.toTimeString().slice(0, 8);
  const el = document.getElementById('tb-clock');
  if (el) el.innerHTML = `<span class="tb-date">${d}</span> &nbsp;${t}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── Mobile sidebar ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── Init terminal ──
function init() {
  initTheme();
  const briefs = AI_NEWS_DATA.briefs.slice().reverse();
  renderSidebar(briefs);
  renderMobileDateBar(briefs);
  renderFilterChips();
  loadBrief(AI_NEWS_DATA.briefs[AI_NEWS_DATA.briefs.length - 1].date);
}

// ── Sidebar ──
function renderSidebar(briefs) {
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  briefs.forEach(b => {
    const el = document.createElement('div');
    el.className = 'date-item';
    el.dataset.date = b.date;
    el.innerHTML = `
      <div class="di-date">${b.date}</div>
      <div class="di-headline">${b.indexHeadline}</div>
      <div class="di-badges">
        ${b.stats.major > 0 ? `<span class="di-badge major">🔴 ${b.stats.major} MAJOR</span>` : ''}
        ${b.stats.significant > 0 ? `<span class="di-badge sig">🟠 ${b.stats.significant} SIG</span>` : ''}
      </div>`;
    el.onclick = () => { loadBrief(b.date); closeSidebar(); };
    list.appendChild(el);
  });
}

function renderMobileDateBar(briefs) {
  const bar = document.getElementById('mobile-datebar');
  bar.innerHTML = '';
  briefs.forEach(b => {
    const chip = document.createElement('div');
    chip.className = 'mob-date-chip';
    chip.dataset.date = b.date;
    chip.textContent = b.date;
    chip.onclick = () => loadBrief(b.date);
    bar.appendChild(chip);
  });
}

function getCatColor(cat) {
  return getTheme() === 'light'
    ? (CAT_CONFIG_LIGHT[cat] || {}).color || '#888'
    : (CAT_CONFIG[cat] || {}).color || '#888';
}

function renderFilterChips() {
  const container = document.getElementById('filter-chips');
  container.innerHTML = '';
  Object.keys(CAT_CONFIG).forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.cat = cat;
    chip.textContent = cat;
    chip.onclick = () => toggleFilter(cat);
    container.appendChild(chip);
  });
}

function updateFilterChipColors() {
  if (!activeFilter) return;
  document.querySelectorAll('.chip').forEach(c => {
    if (c.dataset.cat === activeFilter) {
      c.style.background = getCatColor(activeFilter);
    }
  });
}

function toggleFilter(cat) {
  activeFilter = activeFilter === cat ? null : cat;
  document.querySelectorAll('.chip').forEach(c => {
    const isActive = c.dataset.cat === activeFilter;
    c.classList.toggle('active', isActive);
    c.style.background  = isActive ? getCatColor(c.dataset.cat) : '';
    c.style.color       = isActive ? '' : '';
    c.style.borderColor = isActive ? getCatColor(c.dataset.cat) : '';
  });
  applyFilter();
}

function applyFilter() {
  let visible = 0;
  document.querySelectorAll('.story-card').forEach(card => {
    const match = !activeFilter || card.dataset.cat === activeFilter;
    card.classList.toggle('filtered-out', !match);
    if (match) visible++;
  });
  document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
}

// ── Load brief ──
function loadBrief(date) {
  currentDate = date;
  const brief = AI_NEWS_DATA.briefs.find(b => b.date === date);
  if (!brief) return;

  document.querySelectorAll('.date-item').forEach(el =>
    el.classList.toggle('active', el.dataset.date === date));
  document.querySelectorAll('.mob-date-chip').forEach(el =>
    el.classList.toggle('active', el.dataset.date === date));

  document.getElementById('tb-stats').innerHTML = `
    <span>${brief.stats.total} STORIES</span>
    <span>·</span>
    <span class="s-major">🔴 ${brief.stats.major}</span>
    <span>·</span>
    <span class="s-sig">🟠 ${brief.stats.significant}</span>`;

  document.getElementById('brief-hdr').innerHTML = `
    <div class="bh-date">AI NEWS BRIEF — ${date}</div>
    <div class="bh-headline">${brief.indexHeadline}</div>
    <div class="bh-summary">${brief.indexSummary}</div>
    <div class="bh-stats">
      <div class="bh-stat total"><span class="num">${brief.stats.total}</span> STORIES</div>
      <div class="bh-stat major"><span class="num">${brief.stats.major}</span> MAJOR</div>
      <div class="bh-stat sig"><span class="num">${brief.stats.significant}</span> SIGNIFICANT</div>
    </div>`;

  document.getElementById('signal-box').innerHTML = `
    <div class="signal-hdr">▶ TODAY'S SIGNAL</div>
    ${brief.topSignal.map((s, i) => `
      <div class="signal-item">
        <div class="signal-bullet">0${i+1}</div>
        <div>
          <div class="signal-headline">${s.headline}</div>
          <div class="signal-detail">${s.detail}</div>
        </div>
      </div>`).join('')}`;

  const wrap = document.getElementById('stories-wrap');
  wrap.innerHTML = `<div class="stories-hdr">TOP STORIES</div>`;

  brief.stories.forEach((s, idx) => {
    const card = document.createElement('div');
    card.className = 'story-card' + (idx === 0 ? ' open' : '');
    card.dataset.cat = s.category;
    card.innerHTML = `
      <div class="story-head" onclick="toggleStory(this.parentElement)">
        <div class="story-meta">
          <span class="cat-badge cat-${s.category}">${s.category}</span>
          <span class="priority-dot p${s.priorityLevel}"></span>
          <span class="priority-label p${s.priorityLevel}-txt">${PRIORITY_LABEL[s.priorityLevel]}</span>
          ${s.tags.map(t => `<span class="tag-pill">#${t}</span>`).join('')}
          <span class="expand-arrow">▼</span>
        </div>
        <div class="story-title">${s.id}. ${s.title}</div>
        <div class="story-subtitle">
          <span class="story-event-date">EVENT: ${s.eventDate}</span>
          <span class="story-sources">
            ${s.sources.map(src =>
              `<a class="story-src-link" href="${src.url}" target="_blank" rel="noopener">[${src.name}]</a>`
            ).join('')}
          </span>
        </div>
      </div>
      <div class="story-body">
        <div class="story-section">
          <div class="ss-label">WHAT HAPPENED</div>
          <div class="ss-text">${s.whatHappened}</div>
        </div>
        <div class="story-section">
          <div class="ss-label">WHAT IT CAN DO</div>
          <ul class="ss-list ss-cando">${s.whatItCanDo.map(x => `<li>${x}</li>`).join('')}</ul>
        </div>
        <div class="story-section">
          <div class="ss-label">WHAT'S THE CATCH</div>
          <ul class="ss-list ss-catch">${s.whatsCatch.map(x => `<li>${x}</li>`).join('')}</ul>
        </div>
        <div class="story-section">
          <div class="ss-label">KEY TAKEAWAY</div>
          <div class="takeaway-box"><div class="ss-text">${s.keyTakeaway}</div></div>
        </div>
        <div class="story-section">
          <div class="ss-label">HOW IT CAN IMPROVE</div>
          <div class="ss-text">${s.howToImprove}</div>
        </div>
        <div class="story-section">
          <div class="ss-label">VS. PREVIOUS COVERAGE</div>
          <div class="vs-box">${s.vsPrevious}</div>
        </div>
      </div>`;
    wrap.appendChild(card);
  });

  document.getElementById('quick-hits').innerHTML = `
    <div class="qh-hdr">QUICK HITS</div>
    <div class="qh-list">
      ${brief.quickHits.map(q => `
        <div class="qh-item">
          <div class="qh-bullet">◆</div>
          <div>
            <div class="qh-title">${q.title}</div>
            <div class="qh-text">${q.text}</div>
            <a class="qh-link" href="${q.url}" target="_blank" rel="noopener">→ SOURCE</a>
          </div>
        </div>`).join('')}
    </div>`;

  document.getElementById('main').scrollTo(0, 0);
  window.scrollTo(0, 0);
  applyFilter();
}

function toggleStory(card) { card.classList.toggle('open'); }

// ── Boot ──
initTheme();
initAuth();
</script>
</body>
</html>
