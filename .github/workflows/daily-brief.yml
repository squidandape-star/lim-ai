name: Daily AI News Brief

on:
  schedule:
    # 9:00 AM UTC+1 (Portugal / Western Europe standard time) = 08:00 UTC
    # Change the hour below to match YOUR timezone:
    #   UTC+0  → 9
    #   UTC+1  → 8   ← Portugal (winter)
    #   UTC+2  → 7   ← Portugal (summer / CEST)
    #   UTC+7  → 2
    #   UTC+8  → 1   ← Malaysia / Singapore / China
    - cron: '0 8 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the commit back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/generate_brief.py

      - name: Configure git
        run: |
          git config user.email "hpjm.pt@gmail.com"
          git config user.name "LIM-AI Bot"

      - name: Commit and push
        run: |
          git add output/ storage/ website/data.js
          git diff --staged --quiet && echo "Nothing to commit" || \
          git commit -m "Daily brief $(date +%Y-%m-%d) [bot]" && \
          git push origin main
