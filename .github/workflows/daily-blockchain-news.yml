name: Daily Brief — Blockchain News

on:
  schedule:
    - cron: '0 2 * * *'   # 9:00 AM UTC+7
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/generate_brief.py --feature blockchain-news
      - name: Configure git
        run: |
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "LIM-AI Bot"
